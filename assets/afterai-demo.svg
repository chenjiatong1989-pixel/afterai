<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AfterAI catches a task that claimed completion without passing verification</title>
  <desc id="desc">A dark, minimal AI work recap showing one partial task and one verified task.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0e"/>
      <stop offset="1" stop-color="#12151b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="34" fill="url(#bg)"/>
  <circle cx="1080" cy="100" r="170" fill="#64e6a6" opacity=".035"/>
  <circle cx="90" cy="610" r="230" fill="#ffc766" opacity=".025"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="90" y="82" fill="#9299a8" font-size="18" font-weight="700" letter-spacing="3">AFTER AI · TODAY</text>
    <text x="90" y="142" fill="#f5f7fb" font-size="38" font-weight="700">The agent said “done.”</text>
    <text x="90" y="190" fill="#f5f7fb" font-size="38" font-weight="700">The evidence disagreed.</text>

    <g filter="url(#shadow)">
      <rect x="90" y="238" width="1020" height="142" rx="22" fill="#17191f" stroke="#303540"/>
      <rect x="120" y="270" width="104" height="34" rx="17" fill="#463818"/>
      <text x="172" y="293" text-anchor="middle" fill="#ffc766" font-size="15" font-weight="750">PARTIAL</text>
      <text x="120" y="337" fill="#f5f7fb" font-size="23" font-weight="650">Update the billing API and verify the integration</text>
      <text x="870" y="291" fill="#9299a8" font-size="16">36.7K tokens · 2 retries</text>
      <text x="120" y="367" fill="#ff8a98" font-size="16">Last verification failed · npm run test:integration · exit 1</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="90" y="400" width="1020" height="112" rx="22" fill="#17191f" stroke="#303540"/>
      <rect x="120" y="430" width="112" height="34" rx="17" fill="#153c2d"/>
      <text x="176" y="453" text-anchor="middle" fill="#64e6a6" font-size="15" font-weight="750">VERIFIED</text>
      <text x="258" y="453" fill="#f5f7fb" font-size="22" font-weight="650">Fix checkout validation</text>
      <text x="870" y="453" fill="#9299a8" font-size="16">21.1K tokens</text>
      <text x="258" y="485" fill="#64e6a6" font-size="16">12 tests passed · exit 0</text>
    </g>

    <text x="90" y="568" fill="#9299a8" font-size="16">100% local · No account · No API key · No uploaded logs</text>
    <text x="1110" y="568" text-anchor="end" fill="#f5f7fb" font-size="20" font-weight="750">AfterAI</text>
  </g>
</svg>
